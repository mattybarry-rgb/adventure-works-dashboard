<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Works — Sales Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f8fa; --card:#ffffff; --border:#e3e7ee; --ink:#1f3a5f; --body:#3d4f66; --muted:#7a8aa0;
    --forest:#2f6b4f; --amber:#d9a441; --terra:#c45a3b; --sky:#5b8fb9; --moss:#7ca261; --sand:#e8d5b0;
    --pos:#2f6b4f; --neg:#c0392b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;font-size:14px}
  /* ---- header ---- */
  header{background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:34px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  .brand{font-family:'Source Serif 4',serif;font-size:27px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
  .brand em{font-style:normal;color:var(--forest)}
  .kpistrip{display:flex;gap:34px;flex-wrap:wrap;margin-left:auto}
  .skpi .l{font-size:10.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
  .skpi .v{font-size:19px;font-weight:700;color:var(--ink);font-family:'JetBrains Mono',monospace;margin-top:1px}
  .skpi .v.amber{color:var(--amber)} .skpi .v.green{color:var(--forest)} .skpi .v.terra{color:var(--terra)}
  .asof{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.5}
  /* ---- toolbar ---- */
  .toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .toolbar .lbl{font-size:11px;font-weight:700;letter-spacing:1.4px;color:var(--muted);margin-right:6px}
  .tab{font-family:inherit;font-size:13px;font-weight:600;padding:7px 18px;border-radius:99px;border:1px solid var(--border);background:#fff;color:var(--body);cursor:pointer;transition:.15s}
  .tab:hover{border-color:var(--forest);color:var(--forest)}
  .tab.active{background:var(--forest);border-color:var(--forest);color:#fff}
  .layoutbox{margin-left:auto;display:flex;align-items:center;gap:8px}
  .layoutbox .lbl{margin:0}
  .lay{width:38px;height:30px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;padding:6px}
  .lay i{display:block;background:#c7d0dc;border-radius:2px;flex:1;height:100%}
  .lay.active{border-color:var(--sky);background:#eef5fb}
  .lay.active i{background:var(--sky)}
  /* ---- pages ---- */
  #panes{display:grid;grid-template-columns:1fr;gap:0}
  #panes.split{grid-template-columns:1fr 1fr;gap:0}
  .pane{min-width:0}
  .pane + .pane{border-left:1px solid var(--border)}
  .paneselect{display:none;padding:10px 28px 0}
  #panes.split .paneselect{display:block}
  .paneselect select{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .page{display:none;padding:22px 28px 50px;max-width:1500px;margin:0 auto}
  .page.show{display:block}
  #panes.split .page{padding:18px 18px 40px}
  h1{font-family:'Source Serif 4',serif;font-size:23px;color:var(--ink);margin-bottom:2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .grid{display:grid;gap:14px}
  .row2{grid-template-columns:2fr 1fr} .rowhalf{grid-template-columns:1fr 1fr}
  #panes.split .row2,#panes.split .rowhalf{grid-template-columns:1fr}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(31,58,95,.05)}
  .card{border-top:3px solid var(--forest)}
  .card.t-amber{border-top-color:var(--amber)} .card.t-terra{border-top-color:var(--terra)} .card.t-sky{border-top-color:var(--sky)}
  .card h3{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1.3px}
  .chartbox{position:relative;height:290px} .chartbox.tall{height:360px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:14px}
  .kpi{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--forest);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(31,58,95,.05)}
  .kpi .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:24px;font-weight:700;margin:3px 0 1px;font-family:'JetBrains Mono',monospace;color:var(--ink)}
  .kpi .delta{font-size:12px;font-weight:600}
  .up{color:var(--pos)} .down{color:var(--neg)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);border-bottom:2px solid var(--border)}
  td{padding:8px 10px;border-top:1px solid var(--border);color:var(--body)}
  td b{color:var(--ink)}
  td.num,th.num{font-family:'JetBrains Mono',monospace;text-align:right;font-size:12.5px}
  .heat{border-radius:6px;padding:3px 8px;display:inline-block;min-width:62px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
  .databar{position:relative;height:16px;border-radius:4px;background:#eef2e8}
  .databar i{position:absolute;left:0;top:0;bottom:0;border-radius:4px;background:linear-gradient(90deg,var(--forest),var(--moss))}
  .pill{display:inline-block;font-size:10.5px;padding:2px 9px;border-radius:99px;font-weight:600;background:#eef5fb;color:var(--sky)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:18px}
  @media(max-width:1100px){#panes.split{grid-template-columns:1fr}}
  @media(max-width:900px){.row2,.rowhalf{grid-template-columns:1fr}.kpistrip{margin-left:0}}
</style>
</head>
<body>
<header>
  <div class="brand">Adventure<em>Works</em></div>
  <div class="kpistrip">
    <div class="skpi"><div class="l">Revenue (All)</div><div class="v">$109.8M</div></div>
    <div class="skpi"><div class="l">Profit</div><div class="v amber">$12.6M</div></div>
    <div class="skpi"><div class="l">Margin</div><div class="v green">11.4%</div></div>
    <div class="skpi"><div class="l">Orders</div><div class="v">31,455</div></div>
    <div class="skpi"><div class="l">Customers</div><div class="v">18,485</div></div>
    <div class="skpi"><div class="l">FY20 Growth</div><div class="v green">+52.3%</div></div>
    <div class="skpi"><div class="l">Warehouse P&amp;L</div><div class="v terra">−$4.8K</div></div>
  </div>
  <div class="asof">Data as of · Jun 10, 2026<br>Power BI semantic model</div>
</header>

<div class="toolbar">
  <span class="lbl">PAGES</span>
  <button class="tab active" data-p="p1">Executive Pulse</button>
  <button class="tab" data-p="p2">Product &amp; Profitability</button>
  <button class="tab" data-p="p3">Customers &amp; Territory</button>
  <div class="layoutbox">
    <span class="lbl">LAYOUT</span>
    <button class="lay active" id="laySingle" title="Single page"><i></i></button>
    <button class="lay" id="laySplit" title="Two pages side by side"><i></i><i></i></button>
  </div>
</div>

<div id="panes">
  <div class="pane" id="paneA">
    <div class="paneselect"><select id="selA"><option value="p1">Executive Pulse</option><option value="p2">Product &amp; Profitability</option><option value="p3">Customers &amp; Territory</option></select></div>
    <div class="pagehost"></div>
  </div>
  <div class="pane" id="paneB" style="display:none">
    <div class="paneselect"><select id="selB"><option value="p1">Executive Pulse</option><option value="p2" selected>Product &amp; Profitability</option><option value="p3">Customers &amp; Territory</option></select></div>
    <div class="pagehost"></div>
  </div>
</div>

<!-- PAGE 1 -->
<template id="tpl-p1"><section class="page show">
  <h1>Executive Pulse</h1>
  <div class="sub">FY2018 – FY2020 · Internet + Reseller channels · monthly trend, channel mix &amp; geography</div>
  <div class="grid kpis">
    <div class="kpi"><div class="lbl">Total Revenue</div><div class="val">$109.8M</div><div class="delta up">▲ 52.3% YoY FY20</div></div>
    <div class="kpi"><div class="lbl">Profit</div><div class="val">$12.6M</div><div class="delta up">▲ 56.6% YoY FY20</div></div>
    <div class="kpi"><div class="lbl">Avg Order Value</div><div class="val">$3,491</div><div class="delta down">▼ 69.3% YoY FY20</div></div>
    <div class="kpi"><div class="lbl">Units Sold</div><div class="val">274.8K</div><div class="delta up">▲ 100.5% YoY FY20</div></div>
  </div>
  <div class="grid row2">
    <div class="card"><h3>Monthly Revenue by Channel + Profit</h3><div class="chartbox tall"><canvas data-c="cTrend"></canvas></div></div>
    <div class="card t-amber"><h3>Revenue by Channel</h3><div class="chartbox tall"><canvas data-c="cChannel"></canvas></div></div>
  </div>
  <div class="grid rowhalf" style="margin-top:14px">
    <div class="card t-sky"><h3>Revenue by Country (colour = margin)</h3><div class="chartbox"><canvas data-c="cCountry"></canvas></div></div>
    <div class="card t-terra"><h3>Category Revenue Ranking</h3><div class="chartbox"><canvas data-c="cCategory"></canvas></div></div>
  </div>
</section></template>

<!-- PAGE 2 -->
<template id="tpl-p2"><section class="page show">
  <h1>Product &amp; Profitability</h1>
  <div class="sub">397 products · 4 categories · revenue vs margin economics</div>
  <div class="grid rowhalf">
    <div class="card"><h3>Stars &amp; Dogs — Revenue vs Margin (bubble = units)</h3><div class="chartbox tall"><canvas data-c="cScatter"></canvas></div></div>
    <div class="card t-amber"><h3>Subcategory Revenue by Fiscal Year</h3><div class="chartbox tall"><canvas data-c="cRibbon"></canvas></div></div>
  </div>
  <div class="grid rowhalf" style="margin-top:14px">
    <div class="card t-sky"><h3>Top 10 Products by Revenue</h3><div class="chartbox"><canvas data-c="cTop10"></canvas></div></div>
    <div class="card t-terra"><h3>Margin Heatmap — Category × Fiscal Year</h3><div data-c="heatTable"></div></div>
  </div>
</section></template>

<!-- PAGE 3 -->
<template id="tpl-p3"><section class="page show">
  <h1>Customers &amp; Territory</h1>
  <div class="sub">18,485 customers · 702 resellers · 3 continental groups</div>
  <div class="grid rowhalf">
    <div class="card"><h3>New vs Returning Customers by Quarter</h3><div class="chartbox"><canvas data-c="cNewRet"></canvas></div></div>
    <div class="card t-terra"><h3>Channel Economics — Revenue by Business Type</h3><div class="chartbox"><canvas data-c="cBizType"></canvas></div></div>
  </div>
  <div class="grid row2" style="margin-top:14px">
    <div class="card t-sky"><h3>Top 15 Resellers</h3><div data-c="resellerTable" style="max-height:400px;overflow:auto"></div></div>
    <div class="card t-amber"><h3>Top Customer Regions (Internet)</h3><div class="chartbox tall"><canvas data-c="cStates"></canvas></div></div>
  </div>
</section></template>

<footer>Built from the Power BI semantic model · Adventure Works DW · June 2026</footer>

<script src="data.js"></script>
<script>
const money = v => Math.abs(v)>=1e6 ? '$'+(v/1e6).toFixed(1)+'M' : Math.abs(v)>=1e3 ? '$'+(v/1e3).toFixed(0)+'K' : '$'+Math.round(v);
const pct = v => (v*100).toFixed(1)+'%';
Chart.defaults.font.family = "'Inter',sans-serif";
Chart.defaults.color = '#7a8aa0';
const GRID = '#edf0f4', INK = '#1f3a5f';
// adventure palette
const C = {forest:'#2f6b4f', moss:'#7ca261', amber:'#d9a441', terra:'#c45a3b', sky:'#5b8fb9', sand:'#cbb287', pine:'#1d4636', clay:'#a9714b'};

let charts = [];
function renderPage(host, pageId){
  host.querySelectorAll('canvas').forEach(cv=>{const ch=Chart.getChart(cv); if(ch) ch.destroy();});
  host.innerHTML = '';
  host.appendChild(document.getElementById('tpl-'+pageId).content.cloneNode(true));
  const el = n => host.querySelector('[data-c="'+n+'"]');

  if(pageId==='p1'){
    new Chart(el('cTrend'),{type:'bar',data:{labels:AW.months,datasets:[
      {label:'Internet',data:AW.internetRev,backgroundColor:C.forest,stack:'r',borderRadius:3},
      {label:'Reseller',data:AW.resellerRev,backgroundColor:C.sand,stack:'r',borderRadius:3},
      {label:'Profit',type:'line',data:AW.internetProfit.map((p,i)=>p+AW.resellerProfit[i]),borderColor:C.terra,backgroundColor:C.terra,tension:.35,pointRadius:0,borderWidth:2.5,yAxisID:'y1'}
    ]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:money},grid:{color:GRID}},
      y1:{position:'right',grid:{display:false},ticks:{callback:money}}},
      plugins:{legend:{labels:{usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+money(c.raw)}}}}});

    new Chart(el('cChannel'),{type:'doughnut',data:{labels:['Reseller','Internet'],datasets:[{data:[80450597,29358677],backgroundColor:[C.sand,C.forest],borderWidth:2,borderColor:'#fff',hoverOffset:8}]},
     options:{maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true}},tooltip:{callbacks:{label:c=>c.label+': '+money(c.raw)+' ('+pct(c.raw/109809274)+')'}}}}});

    const byCountry = {};
    AW.territories.forEach(t=>{const c=byCountry[t.country]??={rev:0,prof:0};c.rev+=t.revenue;c.prof+=t.profit;});
    const cn = Object.entries(byCountry).sort((a,b)=>b[1].rev-a[1].rev);
    const marginColor = m => m>0.25?C.forest:m>0.12?C.moss:m>0.06?C.amber:C.terra;
    new Chart(el('cCountry'),{type:'bar',data:{labels:cn.map(c=>c[0]),datasets:[{data:cn.map(c=>c[1].rev),backgroundColor:cn.map(c=>marginColor(c[1].prof/c[1].rev)),borderRadius:5}]},
     options:{indexAxis:'y',maintainAspectRatio:false,scales:{x:{ticks:{callback:money},grid:{color:GRID}},y:{grid:{display:false}}},
     plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.raw)+' · margin '+pct(cn[c.dataIndex][1].prof/cn[c.dataIndex][1].rev)}}}}});

    const byCat={};AW.subcatFY.forEach(r=>byCat[r[0]]=(byCat[r[0]]||0)+r[3]);
    const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    new Chart(el('cCategory'),{type:'bar',data:{labels:cats.map(c=>c[0]),datasets:[{data:cats.map(c=>c[1]),backgroundColor:[C.forest,C.amber,C.sky,C.terra],borderRadius:6}]},
     options:{maintainAspectRatio:false,scales:{y:{ticks:{callback:money},grid:{color:GRID}},x:{grid:{display:false}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.raw)}}}}});
  }

  if(pageId==='p2'){
    const catColor={Bikes:C.forest,Components:C.terra,Clothing:C.sky,Accessories:C.amber};
    new Chart(el('cScatter'),{type:'bubble',data:{datasets:Object.keys(catColor).map(cat=>({
      label:cat,backgroundColor:catColor[cat]+'B3',
      data:AW.products.filter(p=>p[1]===cat).map(p=>({x:p[2],y:p[3]*100,r:Math.sqrt(p[4])/4+3,n:p[0]}))
    }))},options:{maintainAspectRatio:false,scales:{x:{type:'logarithmic',title:{display:true,text:'Revenue (log)'},ticks:{callback:money},grid:{color:GRID}},
     y:{title:{display:true,text:'Margin %'},grid:{color:GRID}}},
     plugins:{legend:{labels:{usePointStyle:true}},tooltip:{callbacks:{label:c=>c.raw.n+': '+money(c.raw.x)+' · '+c.raw.y.toFixed(1)+'%'}}}}});

    const subTotals={};AW.subcatFY.forEach(r=>subTotals[r[1]]=(subTotals[r[1]]||0)+r[3]);
    const topSubs=Object.entries(subTotals).sort((a,b)=>b[1]-a[1]).slice(0,8).map(s=>s[0]);
    const fys=['FY2018','FY2019','FY2020'];
    const subColors=[C.forest,C.moss,C.pine,C.amber,C.sand,C.terra,C.sky,C.clay];
    new Chart(el('cRibbon'),{type:'bar',data:{labels:fys,datasets:topSubs.map((s,i)=>({
      label:s,backgroundColor:subColors[i],borderRadius:3,
      data:fys.map(fy=>AW.subcatFY.filter(r=>r[1]===s&&r[2]===fy).reduce((a,r)=>a+r[3],0))
    }))},options:{maintainAspectRatio:false,scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:money},grid:{color:GRID}}},
     plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+money(c.raw)}}}}});

    const top10=[...AW.products].sort((a,b)=>b[2]-a[2]).slice(0,10);
    new Chart(el('cTop10'),{type:'bar',data:{labels:top10.map(p=>p[0]),datasets:[{data:top10.map(p=>p[2]),backgroundColor:top10.map(p=>p[3]>0.15?C.forest:p[3]>0?C.amber:C.terra),borderRadius:5}]},
     options:{indexAxis:'y',maintainAspectRatio:false,scales:{x:{ticks:{callback:money},grid:{color:GRID}},y:{ticks:{font:{size:11}},grid:{display:false}}},
     plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.raw)+' · margin '+pct(top10[c.dataIndex][3])}}}}});

    const byCat={};AW.subcatFY.forEach(r=>byCat[r[0]]=(byCat[r[0]]||0)+r[3]);
    const heatCats=['Bikes','Components','Clothing','Accessories'];
    const heat = m => m==null?'<td></td>':`<td class="num"><span class="heat" style="background:${m>0.2?'#e2efe6':m>0.08?'#f6ecd6':m>0?'#fbf3e4':'#f7e2dc'};color:${m>0?'#1f3a5f':'#c0392b'}">${pct(m)}</span></td>`;
    let ht='<table><tr><th>Category</th>'+fys.map(f=>'<th class="num">'+f+'</th>').join('')+'<th class="num">Revenue (all)</th><th style="width:28%">Share</th></tr>';
    const maxCat=Math.max(...heatCats.map(c=>byCat[c]));
    heatCats.forEach(cat=>{
      ht+='<tr><td><b>'+cat+'</b></td>';
      fys.forEach(fy=>{
        const rows=AW.subcatFY.filter(r=>r[0]===cat&&r[2]===fy);
        if(!rows.length){ht+=heat(null);return;}
        const rev=rows.reduce((a,r)=>a+r[3],0),prof=rows.reduce((a,r)=>a+r[4],0);
        ht+=heat(prof/rev);
      });
      ht+=`<td class="num">${money(byCat[cat])}</td><td><div class="databar"><i style="width:${byCat[cat]/maxCat*100}%"></i></div></td></tr>`;
    });
    el('heatTable').innerHTML=ht+'</table>';
  }

  if(pageId==='p3'){
    const qLabels=[],qNew=[],qRet=[];
    for(let i=0;i<36;i+=3){
      const y=2017+Math.floor((i+6)/12), q='Q'+(Math.floor(((i+6)%12)/3)+1);
      qLabels.push(q+" '"+String(y).slice(2));
      qNew.push(AW.newCust.slice(i,i+3).reduce((a,b)=>a+b,0));
      qRet.push(AW.retCust.slice(i,i+3).reduce((a,b)=>a+b,0));
    }
    new Chart(el('cNewRet'),{type:'bar',data:{labels:qLabels,datasets:[
      {label:'New',data:qNew,backgroundColor:C.forest,stack:'c',borderRadius:3},
      {label:'Returning',data:qRet,backgroundColor:C.amber,stack:'c',borderRadius:3}]},
     options:{maintainAspectRatio:false,scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:GRID}}},plugins:{legend:{labels:{usePointStyle:true}}}}});

    new Chart(el('cBizType'),{type:'bar',data:{labels:AW.businessTypes.map(b=>b.type),datasets:[{data:AW.businessTypes.map(b=>b.revenue),
     backgroundColor:AW.businessTypes.map(b=>b.profit>1e6?C.forest:b.profit>0?C.sky:C.terra),borderRadius:5}]},
     options:{indexAxis:'y',maintainAspectRatio:false,scales:{x:{ticks:{callback:money},grid:{color:GRID}},y:{grid:{display:false}}},
     plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const b=AW.businessTypes[c.dataIndex];return money(b.revenue)+' rev · '+money(b.profit)+' profit';}}}}}});

    let rt='<table><tr><th>Reseller</th><th>Type</th><th>Country</th><th class="num">Revenue</th><th class="num">Margin</th></tr>';
    AW.topResellers.forEach(r=>{
      const mc=r.margin>=0.05?'var(--pos)':r.margin>=0?'var(--amber)':'var(--neg)';
      rt+=`<tr><td><b>${r.name}</b></td><td><span class="pill">${r.type.replace('Value Added Reseller','VAR').replace('Specialty Bike Shop','Specialty')}</span></td>
      <td>${r.country}</td><td class="num">${money(r.revenue)}</td><td class="num" style="color:${mc};font-weight:600">${pct(r.margin)}</td></tr>`;
    });
    el('resellerTable').innerHTML=rt+'</table>';

    const st=AW.customerStates.slice(0,12);
    new Chart(el('cStates'),{type:'bar',data:{labels:st.map(s=>s.state),datasets:[{data:st.map(s=>s.revenue),backgroundColor:C.moss,borderRadius:5}]},
     options:{indexAxis:'y',maintainAspectRatio:false,scales:{x:{ticks:{callback:money},grid:{color:GRID}},y:{grid:{display:false},ticks:{font:{size:11}}}},
     plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.raw)+' · '+st[c.dataIndex].customers.toLocaleString()+' customers'}}}}});
  }
}

const hostA = document.querySelector('#paneA .pagehost');
const hostB = document.querySelector('#paneB .pagehost');
const selA = document.getElementById('selA'), selB = document.getElementById('selB');
let split = false;

function setSingle(pageId){
  selA.value = pageId;
  renderPage(hostA, pageId);
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.p===pageId));
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ if(split){selA.value=b.dataset.p; renderPage(hostA,b.dataset.p);} setSingle(b.dataset.p); });
selA.onchange = ()=>renderPage(hostA, selA.value);
selB.onchange = ()=>renderPage(hostB, selB.value);

document.getElementById('laySingle').onclick = ()=>{
  split=false;
  document.getElementById('panes').classList.remove('split');
  document.getElementById('paneB').style.display='none';
  document.getElementById('laySingle').classList.add('active');
  document.getElementById('laySplit').classList.remove('active');
};
document.getElementById('laySplit').onclick = ()=>{
  split=true;
  document.getElementById('panes').classList.add('split');
  document.getElementById('paneB').style.display='block';
  document.getElementById('laySplit').classList.add('active');
  document.getElementById('laySingle').classList.remove('active');
  renderPage(hostB, selB.value);
};

renderPage(hostA, 'p1');
</script>
</body>
</html>
